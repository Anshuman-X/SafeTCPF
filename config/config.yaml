# SafeTCPF Configuration

simulation:
  grid_width: 20
  grid_height: 24
  # Road lanes coordinates:
  # Vertical road (columns): 8, 9 (Southbound), 10, 11 (Northbound)
  # Horizontal road (rows): 10, 11 (Eastbound), 12, 13 (Westbound)
  vertical_lanes: [8, 9, 10, 11]
  horizontal_lanes: [10, 11, 12, 13]
  
  # Pedestrian crossing coordinates
  # Pedestrians cross the road at the boundaries of the intersection:
  # North crosswalk: y = 14, x in [8..11]
  # South crosswalk: y = 9, x in [8..11]
  # East crosswalk: x = 12, y in [10..13]
  # West crosswalk: x = 7, y in [10..13]
  pedestrian_crosswalks:
    north: {y: 14, x_range: [8, 11]}
    south: {y: 9, x_range: [8, 11]}
    east: {x: 12, y_range: [10, 13]}
    west: {x: 7, y_range: [10, 13]}

  # Realistic Simulation Parameters (Objective 3 & 5)
  seeds: [42, 101, 202, 303, 404, 505, 606, 707, 808, 909, 1010, 1111, 1212, 1313, 1414, 1515, 1616, 1717, 1818, 1919]
  traffic_densities: ["low", "medium", "high"]
  pedestrian_densities: ["low", "medium", "high"]
  duration_steps: 150
  
  # Safety thresholds and configuration (Objective 2 & 14)
  safety:
    ttc_threshold_vehicle_vehicle: 1.5
    ttc_threshold_vehicle_pedestrian: 1.0
    pet_threshold_vehicle_vehicle: 2.0
    pet_threshold_vehicle_pedestrian: 2.0
    near_miss_threshold_vehicle_vehicle: 1.0
    near_miss_threshold_vehicle_pedestrian: 0.75
    collision_threshold: 0.1

  # Mixed traffic flow proportions (excluding truck) (Objective 20)
  mixed_traffic:
    proportions:
      car: 0.45
      motorcycle: 0.30
      autorickshaw: 0.15
      bus: 0.05
      bicycle: 0.05

  background_traffic:
    enabled: true
    # Spawning probabilities per step for each density
    probabilities:
      low: 0.10
      medium: 0.25
      high: 0.50
    # Vehicle arrival distribution: 'poisson' or 'binomial' or 'uniform'
    arrival_distribution: "poisson"

planning:
  epsilon: 0.1
  time_limit: 120 # seconds (tightened for efficiency, thanks to our early-exit optimizations)
  max_nodes: 2000

# Scenarios for experiments
scenarios:
  - name: "Motorcade"
    teams:
      - id: 1
        name: "Motorcade"
        agents: [0, 1, 2] # Vehicles 0, 1, 2 form a motorcade
        objective: "min-sum"
      - id: 2
        name: "Public"
        agents: [3, 4, 5, 6] # Other vehicles
        objective: "min-sum"
    agents_def:
      # Start and goals (x, y)
      # Motorcade: entering from East, going West
      - start: [19, 12]
        goal: [0, 12]
      - start: [19, 13]
        goal: [0, 13]
      - start: [18, 12]
        goal: [1, 12]
      # Public: entering from North (going South) and South (going North)
      - start: [8, 23]
        goal: [8, 0]
      - start: [9, 23]
        goal: [9, 0]
      - start: [10, 0]
        goal: [10, 23]
      - start: [11, 0]
        goal: [11, 23]

  - name: "FourTeams"
    teams:
      - id: 1
        name: "Northbound"
        agents: [0, 1]
        objective: "min-sum"
      - id: 2
        name: "Southbound"
        agents: [2, 3]
        objective: "min-sum"
      - id: 3
        name: "Eastbound"
        agents: [4, 5]
        objective: "min-sum"
      - id: 4
        name: "Westbound"
        agents: [6, 7]
        objective: "min-sum"
    agents_def:
      # Northbound
      - start: [10, 0]
        goal: [10, 23]
      - start: [11, 0]
        goal: [11, 23]
      # Southbound
      - start: [8, 23]
        goal: [8, 0]
      - start: [9, 23]
        goal: [9, 0]
      # Eastbound
      - start: [0, 10]
        goal: [19, 10]
      - start: [0, 11]
        goal: [19, 11]
      # Westbound
      - start: [19, 12]
        goal: [0, 12]
      - start: [19, 13]
        goal: [0, 13]

# Standalone mixed traffic and pedestrian generation configuration
traffic_generation:
  seed: 42
  duration_steps: 1000
  selected_traffic_density: "medium"
  selected_pedestrian_density: "medium"
  # Spawning rates (probability of spawn per step) for vehicles:
  vehicle_spawn_rates:
    low: 0.08
    medium: 0.20
    high: 0.40
  # Spawning rates (probability of spawn per step) for pedestrians:
  pedestrian_spawn_rates:
    low: 0.05
    medium: 0.15
    high: 0.30
  # Mixed traffic proportions (must sum to 1.0):
  proportions:
    car: 0.40
    motorcycle: 0.35
    autorickshaw: 0.10
    bus: 0.05
    bicycle: 0.10

